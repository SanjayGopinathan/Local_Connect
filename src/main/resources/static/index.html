<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Local Connect — LAN Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=6" />
</head>
<body>

  <!-- ── LOGIN MODAL ─────────────────────────────── -->
  <div id="loginModal" class="modal-overlay">
    <div class="modal-card login-card">
      <div class="login-logo">
        <span class="logo-icon">⬡</span>
      </div>
      <div class="login-app-name">
        <span class="login-app-name-local">Local</span>
        <span class="login-app-name-connect">Connect</span>
      </div>
      <p class="login-sub">LAN Messenger · File Transfer · Groups</p>
      <div class="input-wrap">
        <input
          id="usernameInput"
          type="text"
          placeholder="Enter your name…"
          autocomplete="off"
          onkeydown="if(event.key==='Enter') joinChat()"
        />
      </div>
      <button class="btn-primary" onclick="joinChat()">Connect →</button>
    </div>
  </div>

  <!-- ── CREATE GROUP MODAL ──────────────────────── -->
  <div id="createGroupModal" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <h3 class="modal-title">New Group</h3>
      <div class="input-wrap">
        <input
          id="groupNameInput"
          type="text"
          placeholder="Group name…"
          autocomplete="off"
          onkeydown="if(event.key==='Enter') createGroup()"
        />
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="document.getElementById('createGroupModal').style.display='none'">Cancel</button>
        <button class="btn-primary" onclick="createGroup()">Create</button>
      </div>
    </div>
  </div>

  <!-- ── SIDEBAR BACKDROP (mobile) ──────────────── -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- ── APP SHELL ───────────────────────────────── -->
  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar-top">
        <!-- Brand -->
        <div class="brand">
          <span class="logo-icon sm">⬡</span>
          <div class="brand-name-wrap">
            <span class="brand-name-local">Local</span><span class="brand-name-connect">Connect</span>
          </div>
        </div>

        <!-- Self tag + close btn on right -->
        <div class="sidebar-top-right">
          <div class="self-tag" id="selfTag">—</div>
          <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close">✕</button>
        </div>
      </div>

      <!-- Scrollable sidebar body -->
      <div class="sidebar-body">

        <!-- REQUESTS -->
        <div id="requests" class="requests-zone"></div>

        <!-- PEOPLE -->
        <section class="sidebar-section">
          <div class="section-label">People</div>
          <div class="user-list"></div>
        </section>

        <!-- GROUPS -->
        <section class="sidebar-section">
          <div class="section-label">
            Groups
            <button id="createGroupBtn" class="new-group-btn" title="New group">＋</button>
          </div>
          <div class="group-list"></div>
        </section>

      </div><!-- /.sidebar-body -->
    </aside>

    <!-- CHAT PANEL -->
    <main class="chat-panel">

      <!-- Group info popup (absolute overlay, top-right of chat panel) -->
      <div class="group-info-popup" id="memberPanel">
        <div class="group-info-popup-header">
          <span class="group-info-popup-title" id="memberPanelTitle">Group Info</span>
          <button class="group-info-popup-close" onclick="toggleMemberPanel()">✕</button>
        </div>
        <div class="group-info-popup-body" id="memberList"></div>
      </div>

      <!-- Typing indicator (inside messages area, shown at bottom) -->
      <div class="chat-header">
        <div class="chat-header-inner">
          <!-- Hamburger — only visible on mobile -->
          <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.2" stroke-linecap="round">
              <line x1="3" y1="6"  x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <span id="chatHeaderText">Select a conversation</span>
          <div class="header-dot" id="headerDot"></div>
          <!-- Group info button — shown only when a group is selected -->
          <button class="group-info-btn" id="groupInfoBtn" style="display:none"
            onclick="toggleMemberPanel()" title="Group info & members">
            ⋯
          </button>
        </div>
      </div>

      <!-- Pinned message bar -->
      <div class="pinned-bar" id="pinnedBar" onclick="scrollToPinned()">
        <span class="pinned-bar-icon">📌</span>
        <div style="flex:1;min-width:0;">
          <span class="pinned-bar-label">Pinned</span>
          <span class="pinned-bar-text" id="pinnedBarText">—</span>
        </div>
        <button class="pinned-bar-close" onclick="unpinMessage(event)" title="Unpin">✕</button>
      </div>

      <div class="messages" id="messages">
        <div class="empty-state">
          <div class="empty-icon">⬡</div>
          <p>Pick someone to start chatting</p>
        </div>
      </div>

      <div class="composer-wrap">
        <!-- Reply preview strip -->
        <div class="reply-preview" id="replyPreview">
          <div style="flex:1;min-width:0;">
            <span class="reply-preview-label">↩ Replying to</span>
            <span class="reply-preview-text" id="replyPreviewText">—</span>
          </div>
          <button class="reply-preview-close" onclick="clearReply()">✕</button>
        </div>
        <div class="composer">
          <button class="attach-btn" id="attachBtn" title="Attach file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66
                       L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <input id="fileInput" type="file" style="display:none" />
          <input id="msgInput" type="text" placeholder="Type a message…" autocomplete="off" />
          <button class="send-btn" id="sendBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div><!-- /.composer-wrap -->

    </main>

  </div><!-- /.app-shell -->

  <!-- Forward Modal -->
  <div class="forward-modal-overlay" id="forwardModal" style="display:none" onclick="closeForwardModal(event)">
    <div class="forward-modal" onclick="event.stopPropagation()">
      <div class="forward-modal-header">
        Forward to…
        <button class="forward-modal-close" onclick="closeForwardModal()">✕</button>
      </div>
      <div class="forward-modal-body" id="forwardModalBody"></div>
    </div>
  </div>

  <script src="/js/app.js?v=6"></script>

  <script>
    /* ── Mobile sidebar open / close ───────────── */
    const _sidebar   = document.getElementById('sidebar');
    const _backdrop  = document.getElementById('sidebarBackdrop');
    const _hamburger = document.getElementById('hamburgerBtn');
    const _closeBtn  = document.getElementById('sidebarCloseBtn');

    function openSidebar() {
      _sidebar.classList.add('open');
      _backdrop.classList.add('visible');
      document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
      _sidebar.classList.remove('open');
      _backdrop.classList.remove('visible');
      document.body.style.overflow = '';
    }

    _hamburger.addEventListener('click', openSidebar);
    _closeBtn.addEventListener('click',  closeSidebar);
    _backdrop.addEventListener('click',  closeSidebar);

    // Auto-close when user/group selected on mobile
    document.querySelector('.sidebar-body').addEventListener('click', function(e) {
      if (window.innerWidth <= 768 && e.target.closest('.user')) {
        setTimeout(closeSidebar, 150);
      }
    });

    /* ── selfTag ────────────────────────────────── */
    const _origJoin = joinChat;
    joinChat = function() {
      _origJoin();
      const val = document.getElementById('usernameInput').value.trim();
      if (val) document.getElementById('selfTag').textContent = val;
    };
  </script>

</body>
</html>
